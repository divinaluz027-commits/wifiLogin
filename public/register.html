<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Divina Luz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="fav.png" type="image/png">
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="logoDvLuz.webp" alt="Divina Luz Logo" class="logo">
    </div>
    <div class="form-box">
      <h2>Cadastre-se na rede</h2>
      <form id="registerForm" novalidate>
        <div class="input-group">
          <label for="nome">Nome</label>
          <input type="text" id="nome" placeholder="Seu nome completo" required>
        </div>
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="seu@email.com" required>
        </div>
        <div class="input-group">
          <label for="telefone">Telefone</label>
          <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
        </div>
        <div class="input-group checkbox-group">
          <input type="checkbox" id="termos" required>
          <label for="termos">Li e concordo com os <a href="termosDeUso.html">Termos de uso</a></label>
        </div>
        <button type="submit" class="btn">Cadastrar</button>
      </form>
      <p class="switch-link">Já tem uma conta? <a href="index.html">Faça login</a></p>
      <div id="registerMessage" class="message"></div>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
